name: 教育行业日报-每日自动更新
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install requests beautifulsoup4 dashscope

      - name: 生成日报网页
        run: |
          python spider.py
          python ai_build.py
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}

      - name: 提交更新
        run: |
          git config --global user.name "vitololo124"
          git config --global user.email "vitololo124@users.noreply.github.com"
          git add index.html archive data raw_news.json
          git commit -m "自动更新今日日报"
          git push origin main
