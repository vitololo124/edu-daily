name: 教育行业日报-每日自动更新
on:
  schedule:
    - cron: "0 0 * * *"  # 北京时间早8点更新
  workflow_dispatch: # 支持手动一键运行

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装Python依赖
        run: |
          python -m pip install requests beautifulsoup4 dashscope

      - name: 执行爬虫+AI生成网页
        run: python spider.py && python ai_build.py
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}

      - name: 部署到GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
