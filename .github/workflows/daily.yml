name: 教育行业日报-每日自动更新
on:
  push:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装Python依赖
        run: |
          python -m pip install requests beautifulsoup4 dashscope
      - name: 执行爬虫
        run: python spider.py
      - name: AI生成日报网页
        run: python ai_build.py
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
      - name: 提交更新
        run: |
          git config --global user.name "edu-daily-bot"
          git config --global user.email "bot@edu-daily.com"
          git add .
          git commit -m "自动更新今日教育行业日报 $(date +%Y-%m-%d)"
          git push
