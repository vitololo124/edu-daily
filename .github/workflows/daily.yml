name: 教育行业日报-每日自动更新
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

# 关键：添加写入权限，让机器人能创建gh-pages分支
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install requests beautifulsoup4 dashscope

      - name: 生成日报网页
        run: |
          python spider.py
          python ai_build.py
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}

      # 重点：自动创建并部署到gh-pages分支
      - name: 部署到Pages（自动创建gh-pages）
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          force_orphan: true  # 强制创建独立分支，避免权限冲突
          publish_branch: gh-pages  # 明确指定部署分支
